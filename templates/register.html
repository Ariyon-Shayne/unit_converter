<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Modern Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="container">
            <h2>Create Account</h2>
            <p>Join us to access the unit converter</p>
            {% if error %}
            <div style="color: #d32f2f; background-color: #ffebee; border: 1px solid #ef9a9a; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; text-align: center;">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST" autocomplete="off">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
                <input type="password" id="reg-password" name="password" placeholder="Password" minlength="4" required autocomplete="new-password">
                <div id="password-strength" style="height: 4px; border-radius: 2px; margin-top: -10px; margin-bottom: 5px; transition: all 0.3s; width: 0;"></div>
                <small id="strength-text" style="display: block; text-align: left; font-size: 12px; margin-top: -5px; margin-bottom: 10px; color: #64748b;"></small>
                <input type="password" name="confirm_password" placeholder="Confirm Password" minlength="4" required autocomplete="new-password">
                <button type="submit">Register</button>
            </form>

            <div class="divider">or</div>

            <a href="/login/google" style="text-decoration: none;">
                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Sign in with Google
                </button>
            </a>

            <p style="margin-top: 24px; margin-bottom: 0;">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
    <script>
        localStorage.removeItem('sessionEndTime');
        
        const passwordInput = document.getElementById('reg-password');
        const strengthBar = document.getElementById('password-strength');
        const strengthText = document.getElementById('strength-text');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            let strength = 0;
            let status = "";
            let color = "#cbd5e1";

            if (val.length >= 4) {
                strength = 1;
                if (val.length >= 8) strength++;
                if (/[A-Z]/.test(val)) strength++;
                if (/[0-9]/.test(val)) strength++;
                if (/[^A-Za-z0-9]/.test(val)) strength++;
            }

            if (val.length === 0) {
                status = "";
                strengthBar.style.width = "0%";
            } else if (strength <= 2) {
                status = "Weak Password";
                color = "#ef4444";
                strengthBar.style.width = "33%";
            } else if (strength <= 4) {
                status = "Medium Password";
                color = "#f59e0b";
                strengthBar.style.width = "66%";
            } else {
                status = "Strong Password";
                color = "#10b981";
                strengthBar.style.width = "100%";
            }

            strengthText.textContent = status;
            strengthText.style.color = color;
            strengthBar.style.backgroundColor = color;
        });

        window.addEventListener('storage', function(e) {
            if (e.key === 'loginEvent') {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
