<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Modern Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="container">
            <h2>Welcome Back</h2>
            <p>Login to your account to continue</p>
            {% if error %}
            <div style="color: #d32f2f; background-color: #ffebee; border: 1px solid #ef9a9a; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 14px; text-align: center;">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST" autocomplete="off">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
                <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
                <button type="submit">Login</button>
            </form>

            <div class="divider">or</div>

            <a href="/login/google" style="text-decoration: none;">
                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
                    Sign in with Google
                </button>
            </a>

            <p style="margin-top: 24px; margin-bottom: 0;">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>
    <script>
        localStorage.removeItem('sessionEndTime');
        window.addEventListener('storage', function(e) {
            if (e.key === 'loginEvent') {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
